  bio:
    type: string
    nullable: true
  country:
    type: string
    nullable: true
  province:
    type: string
    nullable: true
  city:
    type: string
    nullable: true
  website:
    type: string
    nullable: true
  github:
    type: string
    nullable: true
  extra:
    type: object
    additionalProperties: true
    default: {}
