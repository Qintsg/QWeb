components:
  schemas:
    AddOverride:
      type: object
      description: 添加权限覆盖序列化器。
      properties:
        permission_code:
          type: string
          maxLength: 100
        effect:
          $ref: '#/components/schemas/AddOverrideEffectEnum'
        reason:
          type: string
          default: ''
      required:
      - effect
      - permission_code
    AddOverrideEffectEnum:
      enum:
      - allow
      - deny
      type: string
      description: |-
        * `allow` - allow
        * `deny` - deny
    AssignRole:
      type: object
      description: 分配角色序列化器。
      properties:
        role_id:
          type: string
          format: uuid
      required:
      - role_id
    AuditLog:
      type: object
      description: 操作审计日志序列化器。
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          readOnly: true
          default: ''
        action:
          allOf:
          - $ref: '#/components/schemas/AuditLogActionEnum'
          readOnly: true
          title: 操作类型
        module:
          type: string
          readOnly: true
          title: 模块
          description: 如 accounts、iam、blog 等
        resource:
          type: string
          readOnly: true
          title: 操作资源
          description: 如 user、role、permission 等
        resource_id:
          type: string
          readOnly: true
          title: 资源 ID
        detail:
          readOnly: true
          title: 操作详情
          description: 变更前后、参数等 JSON 信息
        ip_address:
          type: string
          readOnly: true
          nullable: true
          title: IP 地址
        user_agent:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 操作时间
      required:
      - action
      - created_at
      - detail
      - id
      - ip_address
      - module
      - resource
      - resource_id
      - user_agent
      - username
    AuditLogActionEnum:
      enum:
      - create
      - update
      - delete
      - export
      - import
      - assign
      - revoke
      - approve
      - reject
      - other
      type: string
      description: |-
        * `create` - 创建
        * `update` - 更新
        * `delete` - 删除
        * `export` - 导出
        * `import` - 导入
        * `assign` - 分配
        * `revoke` - 撤销
        * `approve` - 审批
        * `reject` - 拒绝
        * `other` - 其他
    BlankEnum:
      enum:
      - ''
    CategoryEnum:
      enum:
      - project
      - server
      - tool
      - other
      type: string
      description: |-
        * `project` - 项目展示
        * `server` - 服务器管理
        * `tool` - 工具
        * `other` - 其他
    ChangePassword:
      type: object
      description: |-
        修改密码请求。

        需要提供旧密码验证身份，并设置新密码。
      properties:
        old_password:
          type: string
          writeOnly: true
          description: 当前密码。
        new_password:
          type: string
          writeOnly: true
          description: 新密码，至少 8 个字符。
          minLength: 8
        new_password_confirm:
          type: string
          writeOnly: true
          description: 确认新密码。
      required:
      - new_password
      - new_password_confirm
      - old_password
    GenderEnum:
      enum:
      - male
      - female
      - other
      - unknown
      type: string
      description: |-
        * `male` - 男
        * `female` - 女
        * `other` - 其他
        * `unknown` - 未知
    GitHubOAuthAuthorize:
      type: object
      description: GitHub OAuth 授权地址请求。
      properties:
        redirect:
          type: string
          description: 登录成功后回到前端的相对路径。
    GitHubOAuthCallback:
      type: object
      description: GitHub OAuth 回调换取本地 Token 请求。
      properties:
        code:
          type: string
          description: GitHub 回调返回的授权码。
        state:
          type: string
          description: 后端签名生成的 OAuth state。
      required:
      - code
      - state
    Login:
      type: object
      description: |-
        用户登录请求。

        支持用户名或邮箱 + 密码方式登录。
      properties:
        login:
          type: string
          description: 用户名或邮箱。
        password:
          type: string
          writeOnly: true
          description: 密码。
      required:
      - login
      - password
    LoginLog:
      type: object
      description: 登录日志序列化器。
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          title: 登录用户名
          description: 登录失败时 user 可能为 null，此字段保留尝试的用户名
        login_type:
          type: string
          readOnly: true
          title: 登录方式
        provider:
          type: string
          readOnly: true
          nullable: true
          title: 第三方平台
        action:
          allOf:
          - $ref: '#/components/schemas/LoginLogActionEnum'
          readOnly: true
          title: 操作类型
        ip_address:
          type: string
          readOnly: true
          nullable: true
          title: IP 地址
        user_agent:
          type: string
          readOnly: true
        device_info:
          readOnly: true
          title: 设备信息
        success:
          type: boolean
          readOnly: true
          title: 是否登录成功
        failure_reason:
          type: string
          readOnly: true
          nullable: true
          title: 失败原因
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 操作时间
      required:
      - action
      - created_at
      - device_info
      - failure_reason
      - id
      - ip_address
      - login_type
      - provider
      - success
      - user_agent
      - username
    LoginLogActionEnum:
      enum:
      - login
      - logout
      - failed
      - oauth_bind
      - oauth_register
      type: string
      description: |-
        * `login` - 登录成功
        * `logout` - 登出
        * `failed` - 登录失败
        * `oauth_bind` - OAuth 绑定
        * `oauth_register` - OAuth 自动注册
    Logout:
      type: object
      description: 登出请求。
      properties:
        refresh:
          type: string
          description: 需要吊销的 refresh token。
      required:
      - refresh
    Me:
      type: object
      description: 当前登录用户信息序列化器。
      properties:
        uid:
          type: integer
          readOnly: true
          title: 用户 UID
        username:
          type: string
          readOnly: true
          title: 用户名
          description: 3-32 个字符，允许字母、数字、短横线、下划线和点号。
        nickname:
          type: string
          nullable: true
          title: 展示昵称
          maxLength: 64
        avatar_url:
          type: string
          nullable: true
          title: 头像 URL
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
          title: 账号状态
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          readOnly: true
          title: 用户类型
        is_active:
          type: boolean
          readOnly: true
          title: Django 认证是否启用
          description: 与 status 一起用于 Django 认证框架判断。
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 创建时间
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 更新时间
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: 上次登录
        contact:
          $ref: '#/components/schemas/UserContact'
        profile:
          $ref: '#/components/schemas/UserProfile'
        settings:
          $ref: '#/components/schemas/UserSettings'
      required:
      - created_at
      - is_active
      - last_login
      - status
      - uid
      - updated_at
      - user_type
      - username
    NullEnum:
      enum:
