  /api/v1/login-logs/:
    get:
      operationId: v1_login_logs_list
      description: |-
        登录日志列表（管理员只读）。

        支持按 action 过滤，按 created_at 排序。
      parameters:
      - in: query
        name: action
        schema:
          type: string
          title: 操作类型
          enum:
          - failed
          - login
          - logout
          - oauth_bind
          - oauth_register
        description: |-
          * `login` - 登录成功
          * `logout` - 登出
          * `failed` - 登录失败
          * `oauth_bind` - OAuth 绑定
          * `oauth_register` - OAuth 自动注册
      - in: query
        name: login_type
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: 用于排序结果的字段。
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
