        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Logout'
          description: ''
  /api/v1/auth/oauth/{provider}/authorize/:
    get:
      operationId: v1_auth_oauth_authorize_retrieve
      description: |-
        OAuth 授权地址接口。

        GET /api/v1/auth/oauth/{provider}/authorize/
        返回第三方授权跳转 URL，client secret 不下发到前端。
      parameters:
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthAuthorize'
          description: ''
  /api/v1/auth/oauth/{provider}/bind/:
    post:
      operationId: v1_auth_oauth_bind_create
      description: 绑定第三方账号到已有账号。
      parameters:
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthBind'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OAuthBind'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OAuthBind'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthBind'
          description: ''
  /api/v1/auth/oauth/{provider}/callback/:
    post:
      operationId: v1_auth_oauth_callback_create
      description: |-
        OAuth 回调完成接口。

        POST /api/v1/auth/oauth/{provider}/callback/
        前端回调页提交 code/state 后，后端换取资料并返回登录或待选择状态。
      parameters:
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthCallback'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OAuthCallback'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OAuthCallback'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthCallback'
          description: ''
  /api/v1/auth/oauth/{provider}/register/:
    post:
      operationId: v1_auth_oauth_register_create
      description: 使用第三方账号自动注册新账号。
      parameters:
      - in: path
        name: provider
